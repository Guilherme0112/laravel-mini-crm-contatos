version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: minicrm_app
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - minicrm_network

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: minicrm_queue
    command: bash -c "while [ ! -f vendor/autoload.php ]; do echo 'Aguardando vendor...'; sleep 2; done; php artisan queue:work redis --sleep=3 --tries=3"
    volumes:
      - .:/var/www
    depends_on:
      - app
      - redis
    networks:
      - minicrm_network

  postgres:
    image: postgres:15-alpine
    container_name: minicrm_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE:-mini-crm}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-123456}
    volumes:
      - minicrm_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-mini-crm}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - minicrm_network

  redis:
    image: redis:alpine
    container_name: minicrm_redis
    ports:
      - "6379:6379"
    volumes:
      - minicrm_redisdata:/data
    networks:
      - minicrm_network

  soketi:
    image: 'quay.io/soketi/soketi:1.6-16-alpine'
    container_name: minicrm_soketi
    environment:
      SOKETI_DEBUG: '1'
      SOKETI_METRICS_SERVER_PORT: '9601'
      SOKETI_DEFAULT_APP_ID: ${PUSHER_APP_ID:-app-id}
      SOKETI_DEFAULT_APP_KEY: ${PUSHER_APP_KEY:-app-key}
      SOKETI_DEFAULT_APP_SECRET: ${PUSHER_APP_SECRET:-app-secret}
    ports:
      - "6001:6001"
      - "9601:9601"
    networks:
      - minicrm_network

networks:
  minicrm_network:
    driver: bridge

volumes:
  minicrm_pgdata:
  minicrm_redisdata:
